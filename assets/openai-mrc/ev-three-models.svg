<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Three ways MRC selects a network path: ECMP hash, Structured EV, and SRv6 source routing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="ds" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="sds" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <g font-family="'Baloo 2','Comic Sans MS',system-ui,sans-serif" text-anchor="middle">
    <text x="800" y="90" font-size="60" font-weight="900" fill="#4338ca" stroke="#1e1b4b" stroke-width="2.5" paint-order="stroke">
      How does MRC pick a path?
    </text>
    <text x="800" y="135" font-size="24" font-weight="700" fill="#1e3a8a">
      Three ways to turn an Entropy Value (EV) into a route
    </text>
  </g>

  <!-- ============== Common: cartoon NIC sender ============== -->
  <!-- We'll place a small NIC character above each column for consistency -->

  <!-- =================== COLUMN 1: ECMP =================== -->
  <g transform="translate(60,180)">
    <!-- card -->
    <rect x="0" y="0" width="480" height="660" rx="28" fill="#ffffff" stroke="#1e1b4b" stroke-width="4" filter="url(#ds)"/>

    <!-- header bar -->
    <rect x="0" y="0" width="480" height="74" rx="28" fill="#60a5fa" stroke="#1e1b4b" stroke-width="4"/>
    <rect x="0" y="46" width="480" height="28" fill="#60a5fa"/>
    <text x="240" y="50" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="30" font-weight="900" fill="#ffffff" stroke="#1e1b4b" stroke-width="2" paint-order="stroke">1. ECMP Hashing</text>

    <!-- NIC character -->
    <g transform="translate(40,100)">
      <rect x="0" y="0" width="120" height="80" rx="14" fill="#fde68a" stroke="#1e1b4b" stroke-width="4"/>
      <circle cx="38" cy="32" r="9" fill="#fff" stroke="#1e1b4b" stroke-width="3"/>
      <circle cx="82" cy="32" r="9" fill="#fff" stroke="#1e1b4b" stroke-width="3"/>
      <circle cx="40" cy="34" r="4" fill="#1e1b4b"/>
      <circle cx="84" cy="34" r="4" fill="#1e1b4b"/>
      <path d="M45 58 Q60 70 75 58" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
      <text x="60" y="98" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="13" font-weight="800" fill="#1e1b4b">NIC</text>
    </g>

    <!-- packet -->
    <g transform="translate(200,110)" font-family="'Baloo 2',system-ui,sans-serif">
      <rect x="0" y="0" width="240" height="60" rx="10" fill="#dbeafe" stroke="#1e1b4b" stroke-width="3"/>
      <text x="120" y="24" text-anchor="middle" font-size="14" font-weight="900" fill="#1e3a8a">PKT carries EV =</text>
      <text x="120" y="46" text-anchor="middle" font-size="14" font-weight="800" fill="#1e1b4b">UDP sport + flow label</text>
    </g>

    <!-- Switch -->
    <g transform="translate(160,210)">
      <rect x="0" y="0" width="160" height="64" rx="10" fill="#f1f5f9" stroke="#1e1b4b" stroke-width="4"/>
      <text x="80" y="26" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="16" font-weight="900" fill="#1e1b4b">Switch</text>
      <text x="80" y="50" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="13" font-weight="700" fill="#7c3aed">hash(EV) % N</text>
    </g>
    <!-- thinking bubble -->
    <g transform="translate(330,200)">
      <ellipse cx="0" cy="0" rx="55" ry="28" fill="#ffffff" stroke="#1e1b4b" stroke-width="3"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="16" font-weight="900" fill="#7c3aed">hash!</text>
    </g>

    <!-- 4 paths fanning out -->
    <g stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M240 274 C 120 350, 80 380, 70 460" stroke="#60a5fa"/>
      <path d="M240 274 C 200 350, 180 380, 175 460" stroke="#34d399"/>
      <path d="M240 274 C 270 350, 290 380, 295 460" stroke="#fbbf24"/>
      <path d="M240 274 C 360 350, 400 380, 410 460" stroke="#f87171"/>
    </g>
    <!-- endpoint dots -->
    <g>
      <circle cx="70" cy="468" r="14" fill="#dbeafe" stroke="#1e1b4b" stroke-width="3"/>
      <circle cx="175" cy="468" r="14" fill="#d1fae5" stroke="#1e1b4b" stroke-width="3"/>
      <circle cx="295" cy="468" r="14" fill="#fef3c7" stroke="#1e1b4b" stroke-width="3"/>
      <circle cx="410" cy="468" r="14" fill="#fee2e2" stroke="#1e1b4b" stroke-width="3"/>
    </g>

    <!-- caption -->
    <g font-family="'Baloo 2',system-ui,sans-serif" text-anchor="middle">
      <text x="240" y="520" font-size="16" font-weight="900" fill="#1e1b4b">Switch hashes the EV into</text>
      <text x="240" y="542" font-size="16" font-weight="900" fill="#1e1b4b">one of N equal-cost paths.</text>
    </g>

    <!-- pros / cons -->
    <g transform="translate(28,570)" font-family="'Baloo 2',system-ui,sans-serif" font-size="14" font-weight="700">
      <text x="0" y="0" fill="#15803d">✓ works on any commodity Clos</text>
      <text x="0" y="22" fill="#15803d">✓ no special switch config</text>
      <text x="0" y="48" fill="#b91c1c">✗ NIC doesn't know which path</text>
      <text x="0" y="70" fill="#b91c1c">✗ hash collisions can hot-spot</text>
    </g>
  </g>

  <!-- =================== COLUMN 2: Structured EV =================== -->
  <g transform="translate(560,180)">
    <rect x="0" y="0" width="480" height="660" rx="28" fill="#ffffff" stroke="#1e1b4b" stroke-width="4" filter="url(#ds)"/>

    <rect x="0" y="0" width="480" height="74" rx="28" fill="#a78bfa" stroke="#1e1b4b" stroke-width="4"/>
    <rect x="0" y="46" width="480" height="28" fill="#a78bfa"/>
    <text x="240" y="50" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="30" font-weight="900" fill="#ffffff" stroke="#1e1b4b" stroke-width="2" paint-order="stroke">2. Structured EV</text>

    <!-- NIC -->
    <g transform="translate(40,100)">
      <rect x="0" y="0" width="120" height="80" rx="14" fill="#fde68a" stroke="#1e1b4b" stroke-width="4"/>
      <circle cx="38" cy="32" r="9" fill="#fff" stroke="#1e1b4b" stroke-width="3"/>
      <circle cx="82" cy="32" r="9" fill="#fff" stroke="#1e1b4b" stroke-width="3"/>
      <circle cx="40" cy="34" r="4" fill="#1e1b4b"/>
      <circle cx="84" cy="34" r="4" fill="#1e1b4b"/>
      <path d="M45 58 Q60 70 75 58" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
      <text x="60" y="98" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="13" font-weight="800" fill="#1e1b4b">NIC packs hops</text>
    </g>

    <!-- packet showing hop fields -->
    <g transform="translate(200,110)" font-family="'Baloo 2',system-ui,sans-serif">
      <rect x="0" y="0" width="240" height="60" rx="10" fill="#ede9fe" stroke="#1e1b4b" stroke-width="3"/>
      <text x="120" y="20" text-anchor="middle" font-size="13" font-weight="900" fill="#5b21b6">PKT carries EV =</text>
      <!-- subfields -->
      <g transform="translate(12,28)">
        <rect x="0" y="0" width="68" height="24" rx="5" fill="#fef3c7" stroke="#1e1b4b" stroke-width="2"/>
        <text x="34" y="17" text-anchor="middle" font-size="13" font-weight="900" fill="#92400e">hop0</text>
        <rect x="74" y="0" width="68" height="24" rx="5" fill="#d1fae5" stroke="#1e1b4b" stroke-width="2"/>
        <text x="108" y="17" text-anchor="middle" font-size="13" font-weight="900" fill="#065f46">hop1</text>
        <rect x="148" y="0" width="68" height="24" rx="5" fill="#fecaca" stroke="#1e1b4b" stroke-width="2"/>
        <text x="182" y="17" text-anchor="middle" font-size="13" font-weight="900" fill="#991b1b">hop2</text>
      </g>
    </g>

    <!-- switches in tiers, each reads one hop -->
    <g font-family="'Baloo 2',system-ui,sans-serif" text-anchor="middle">
      <!-- T0 -->
      <g transform="translate(200,210)">
        <rect x="0" y="0" width="80" height="48" rx="10" fill="#fef3c7" stroke="#1e1b4b" stroke-width="3"/>
        <text x="40" y="20" font-size="13" font-weight="900" fill="#92400e">T0</text>
        <text x="40" y="38" font-size="11" font-weight="800" fill="#1e1b4b">read hop0</text>
      </g>
      <!-- T1 -->
      <g transform="translate(200,278)">
        <rect x="0" y="0" width="80" height="48" rx="10" fill="#d1fae5" stroke="#1e1b4b" stroke-width="3"/>
        <text x="40" y="20" font-size="13" font-weight="900" fill="#065f46">T1</text>
        <text x="40" y="38" font-size="11" font-weight="800" fill="#1e1b4b">read hop1</text>
      </g>
      <!-- T2 -->
      <g transform="translate(200,346)">
        <rect x="0" y="0" width="80" height="48" rx="10" fill="#fecaca" stroke="#1e1b4b" stroke-width="3"/>
        <text x="40" y="20" font-size="13" font-weight="900" fill="#991b1b">T2</text>
        <text x="40" y="38" font-size="11" font-weight="800" fill="#1e1b4b">read hop2</text>
      </g>
      <!-- arrows between -->
      <g stroke="#1e1b4b" stroke-width="3" fill="none" marker-end="">
        <path d="M240 258 L 240 278"/>
        <path d="M240 326 L 240 346"/>
        <path d="M240 394 L 240 432"/>
      </g>
    </g>

    <!-- destination -->
    <g transform="translate(195,440)">
      <rect x="0" y="0" width="90" height="36" rx="10" fill="#dbeafe" stroke="#1e1b4b" stroke-width="3"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="14" font-weight="900" fill="#1e3a8a">dst GPU</text>
    </g>

    <!-- caption -->
    <g font-family="'Baloo 2',system-ui,sans-serif" text-anchor="middle">
      <text x="240" y="510" font-size="16" font-weight="900" fill="#1e1b4b">Each switch reads its own slice</text>
      <text x="240" y="532" font-size="16" font-weight="900" fill="#1e1b4b">of the EV → its egress port.</text>
      <text x="240" y="554" font-size="14" font-weight="700" fill="#5b21b6">Path is deterministic, no hash.</text>
    </g>

    <g transform="translate(28,580)" font-family="'Baloo 2',system-ui,sans-serif" font-size="14" font-weight="700">
      <text x="0" y="0" fill="#15803d">✓ NIC fully controls each hop</text>
      <text x="0" y="22" fill="#15803d">✓ no hash collisions</text>
      <text x="0" y="48" fill="#b91c1c">✗ switches need EV-parse config</text>
      <text x="0" y="70" fill="#b91c1c">✗ fits regular Clos topologies</text>
    </g>
  </g>

  <!-- =================== COLUMN 3: SRv6 =================== -->
  <g transform="translate(1060,180)">
    <rect x="0" y="0" width="480" height="660" rx="28" fill="#ffffff" stroke="#1e1b4b" stroke-width="4" filter="url(#ds)"/>

    <rect x="0" y="0" width="480" height="74" rx="28" fill="#34d399" stroke="#1e1b4b" stroke-width="4"/>
    <rect x="0" y="46" width="480" height="28" fill="#34d399"/>
    <text x="240" y="50" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="30" font-weight="900" fill="#ffffff" stroke="#1e1b4b" stroke-width="2" paint-order="stroke">3. SRv6 Source Routing</text>

    <!-- NIC -->
    <g transform="translate(40,100)">
      <rect x="0" y="0" width="120" height="80" rx="14" fill="#fde68a" stroke="#1e1b4b" stroke-width="4"/>
      <circle cx="38" cy="32" r="9" fill="#fff" stroke="#1e1b4b" stroke-width="3"/>
      <circle cx="82" cy="32" r="9" fill="#fff" stroke="#1e1b4b" stroke-width="3"/>
      <circle cx="40" cy="34" r="4" fill="#1e1b4b"/>
      <circle cx="84" cy="34" r="4" fill="#1e1b4b"/>
      <path d="M45 58 Q60 70 75 58" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
      <text x="60" y="98" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="13" font-weight="800" fill="#1e1b4b">NIC writes uSID stack</text>
    </g>

    <!-- packet with uSID stack -->
    <g transform="translate(200,110)" font-family="'Baloo 2',system-ui,sans-serif">
      <rect x="0" y="0" width="240" height="60" rx="10" fill="#d1fae5" stroke="#1e1b4b" stroke-width="3"/>
      <text x="120" y="20" text-anchor="middle" font-size="13" font-weight="900" fill="#065f46">IPv6 dst = uSID stack</text>
      <g transform="translate(8,28)" font-size="11" font-weight="900">
        <rect x="0" y="0" width="50" height="24" rx="5" fill="#a7f3d0" stroke="#1e1b4b" stroke-width="2"/>
        <text x="25" y="17" text-anchor="middle" fill="#065f46">usid0</text>
        <rect x="56" y="0" width="50" height="24" rx="5" fill="#a7f3d0" stroke="#1e1b4b" stroke-width="2"/>
        <text x="81" y="17" text-anchor="middle" fill="#065f46">usid1</text>
        <rect x="112" y="0" width="50" height="24" rx="5" fill="#a7f3d0" stroke="#1e1b4b" stroke-width="2"/>
        <text x="137" y="17" text-anchor="middle" fill="#065f46">usid2</text>
        <rect x="168" y="0" width="56" height="24" rx="5" fill="#fef3c7" stroke="#1e1b4b" stroke-width="2"/>
        <text x="196" y="17" text-anchor="middle" fill="#92400e">dst</text>
      </g>
    </g>

    <!-- 3 switches, each pops one usid -->
    <g font-family="'Baloo 2',system-ui,sans-serif" text-anchor="middle">
      <!-- S1 -->
      <g transform="translate(60,220)">
        <rect x="0" y="0" width="120" height="56" rx="10" fill="#ecfccb" stroke="#1e1b4b" stroke-width="3"/>
        <text x="60" y="22" font-size="13" font-weight="900" fill="#365314">Switch 1</text>
        <text x="60" y="42" font-size="11" font-weight="800" fill="#1e1b4b">pop usid0, shift</text>
      </g>
      <!-- S2 -->
      <g transform="translate(180,310)">
        <rect x="0" y="0" width="120" height="56" rx="10" fill="#ecfccb" stroke="#1e1b4b" stroke-width="3"/>
        <text x="60" y="22" font-size="13" font-weight="900" fill="#365314">Switch 2</text>
        <text x="60" y="42" font-size="11" font-weight="800" fill="#1e1b4b">pop usid1, shift</text>
      </g>
      <!-- S3 -->
      <g transform="translate(300,400)">
        <rect x="0" y="0" width="120" height="56" rx="10" fill="#ecfccb" stroke="#1e1b4b" stroke-width="3"/>
        <text x="60" y="22" font-size="13" font-weight="900" fill="#365314">Switch 3</text>
        <text x="60" y="42" font-size="11" font-weight="800" fill="#1e1b4b">pop usid2, shift</text>
      </g>
      <!-- arrows -->
      <g stroke="#1e1b4b" stroke-width="3" fill="none">
        <path d="M180 248 C 220 270, 220 290, 240 310"/>
        <path d="M300 338 C 340 360, 340 380, 360 400"/>
        <path d="M420 428 C 430 450, 410 470, 380 480"/>
      </g>
    </g>

    <!-- destination -->
    <g transform="translate(320,475)">
      <rect x="0" y="0" width="90" height="36" rx="10" fill="#dbeafe" stroke="#1e1b4b" stroke-width="3"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="14" font-weight="900" fill="#1e3a8a">dst GPU</text>
    </g>

    <!-- caption -->
    <g font-family="'Baloo 2',system-ui,sans-serif" text-anchor="middle">
      <text x="240" y="540" font-size="16" font-weight="900" fill="#1e1b4b">NIC writes the whole route into</text>
      <text x="240" y="562" font-size="16" font-weight="900" fill="#1e1b4b">the packet; switches just pop.</text>
    </g>

    <g transform="translate(28,570)" font-family="'Baloo 2',system-ui,sans-serif" font-size="14" font-weight="700">
      <text x="0" y="0" fill="#15803d">✓ exact path = exact EV</text>
      <text x="0" y="22" fill="#15803d">✓ probes &amp; data share path</text>
      <text x="0" y="48" fill="#b91c1c">✗ needs SRv6-capable switches</text>
      <text x="0" y="70" fill="#b91c1c">✗ extra header bytes per packet</text>
    </g>
  </g>

  <!-- bottom take-away strip -->
  <g transform="translate(80,860)">
    <text x="720" y="22" text-anchor="middle" font-family="'Baloo 2',system-ui,sans-serif" font-size="20" font-weight="800" fill="#1e1b4b">
      Same idea everywhere: change the EV → change the path. Only "who decides" the path differs.
    </text>
  </g>
</svg>
